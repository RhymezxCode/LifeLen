name: CI

on:
  push:
    branches: [main, "features/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # compileSdk 37 + the AGP-required build-tools are auto-downloaded by AGP once licenses
      # are accepted (needed because the toolchain is bleeding-edge).
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK and run unit tests
        run: ./gradlew assembleDebug testDebugUnitTest --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lifelens-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
